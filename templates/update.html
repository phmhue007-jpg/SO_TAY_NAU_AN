<!DOCTYPE html>
<html>
<head>
    <title>Sửa công thức</title>
    <style>
        body { font-family: Arial; margin: 40px; background-color: #FFF0F5; }
        .form-box { background: white; padding: 30px; border-radius: 12px; max-width: 500px; margin: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        h1 { color: #FFA500; text-align: center; }
        input, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #FFC0CB; border-radius: 5px; box-sizing: border-box; }
        button { background: #FFA500; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="form-box">
        <h1>SỬA CÔNG THỨC</h1>
        <form method="POST" enctype="multipart/form-data">
            <label>Tên món ăn:</label>
            <input type="text" name="title" value="{{ recipe.title }}" required>
    
            <label>Nguyên liệu:</label>
            <textarea name="ingredients" style="height: 80px;" required>{{ recipe.ingredients }}</textarea>
    
            <label>Các bước làm:</label>
            <textarea name="instructions" style="height: 120px;" required>{{ recipe.instructions }}</textarea>
    
            <label>Thay đổi hình ảnh (Nếu để trống sẽ giữ ảnh cũ):</label>
            <input type="file" name="image_file" accept="image/*">
    
            <button type="submit">Cập nhật công thức</button>
        </form>
        <br>
        <a href="/" style="color: #FFA500; text-decoration: none;">Hủy bỏ và quay lại</a>
    </div>
</body>
</html>
